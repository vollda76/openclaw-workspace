<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steinegger IT - Design Galerie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 60px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #0f0f1a;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }
        
        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ffffff, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0, 217, 255, 0.15);
            border-color: rgba(0, 217, 255, 0.4);
        }
        
        .card-preview {
            height: 220px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }
        
        .card-preview::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .card-preview span {
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
        }
        
        .card-content {
            padding: 28px;
        }
        
        .version-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(0, 217, 255, 0.15);
            color: #00d9ff;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        
        .card-title {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }
        
        .card-desc {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        .card-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #0f0f1a;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }
        
        .card-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 217, 255, 0.4);
        }
        
        .stats {
            text-align: center;
            margin-top: 80px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .stats-number {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        .stats-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }
        
        .footer-note {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .gallery {
                grid-template-columns: 1fr;
            }
            
            .stats-number {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="badge">🎨 Complete Collection</span>
            <h1>Steinegger IT Design Galerie</h1>
            <p class="subtitle">15 einzigartige Design-Konzepte – Von Brutalism bis Playful. Wähle deinen Favoriten!</p>
        </header>
        
        <div class="gallery" id="gallery">
            <!-- Cards werden per JS eingefügt -->
        </div>
        
        <div class="stats">
            <div class="stats-number" id="count">0</div>
            <div class="stats-text">Design-Versionen verfügbar</div>
        </div>
        
        <div class="footer-note">
            Alle Designs sind responsive und production-ready
        </div>
    </div>
    
    <script>
        const designs = [
            { file: 'showcase-index-brutalism.html', name: 'Brutalism', version: 'v12', emoji: '🔨', desc: 'Raw, edgy, bewusst kaputt. Neon-Accents für den ultimativen Look.', color: 'linear-gradient(135deg, #ff0080, #7928ca)' },
            { file: 'showcase-index-3d-immersive.html', name: '3D Immersive', version: 'v13', emoji: '🧊', desc: 'Three.js Partikel-Universum. Interaktiv und immersiv.', color: 'linear-gradient(135deg, #00c6ff, #0072ff)' },
            { file: 'showcase-index-hand-drawn.html', name: 'Hand Drawn', version: 'v14', emoji: '✏️', desc: 'Persönlich, skizzenhaft, herzlich. Mit handschriftlichen Elementen.', color: 'linear-gradient(135deg, #f093fb, #f5576c)' },
            { file: 'showcase-index-retro-80s.html', name: 'Retro 80s/90s', version: 'v15', emoji: '🌆', desc: 'Memphis Design, Neon, Grid, Synthwave Vibes.', color: 'linear-gradient(135deg, #f953c6, #b91d73)' },
            { file: 'showcase-index-typography.html', name: 'Typography', version: 'v16', emoji: '🔤', desc: 'Pure Typografie. Riesig, bold, monochrom.', color: 'linear-gradient(135deg, #11998e, #38ef7d)' },
            { file: 'showcase-index-organic-fluid.html', name: 'Organic Fluid', version: 'v17', emoji: '🌿', desc: 'Blobs, wellig, natürlich. Organische Formen.', color: 'linear-gradient(135deg, #56ab2f, #a8e063)' },
            { file: 'showcase-index-asymmetric.html', name: 'Asymmetric', version: 'v18', emoji: '⚡', desc: 'Bewusst unausgewogen. Dynamisch, geometrisch.', color: 'linear-gradient(135deg, #f7971e, #ffd200)' },
            { file: 'showcase-index-split-screen.html', name: 'Split Screen', version: 'v19', emoji: '⚖️', desc: '50/50 Layout. Dunkel vs. Hell. Kontrastreich.', color: 'linear-gradient(135deg, #232526, #414345)' },
            { file: 'showcase-index-glassmorphism.html', name: 'Glassmorphism', version: 'v20', emoji: '🪟', desc: 'Milchglas, Blur, Transluzenz. Modern und elegant.', color: 'linear-gradient(135deg, #667eea, #764ba2)' },
            { file: 'showcase-index-neo-brutalism.html', name: 'Neo-Brutalism', version: 'v21', emoji: '🎨', desc: 'Knallig, harte Schatten, Pop-Art Style.', color: 'linear-gradient(135deg, #fc00ff, #00dbde)' },
            { file: 'showcase-index-dark-premium.html', name: 'Dark Premium', version: 'v22', emoji: '🌑', desc: 'Luxuriös, Gold-Accente, elegant. Premium-Look.', color: 'linear-gradient(135deg, #d4af37, #f4cf57)' },
            { file: 'showcase-index-minimalist-swiss.html', name: 'Minimalist Swiss', version: 'v23', emoji: '🇨🇭', desc: 'Reduziert, viel Weissraum. Schweizer Präzision.', color: 'linear-gradient(135deg, #e0e0e0, #ffffff)' },
            { file: 'showcase-index-cyberpunk.html', name: 'Cyberpunk', version: 'v24', emoji: '🤖', desc: 'Neon, Dark, futuristisch. Scanlines & Glitch.', color: 'linear-gradient(135deg, #00f3ff, #ff00ff)' },
            { file: 'showcase-index-corporate-clean.html', name: 'Corporate Clean', version: 'v25', emoji: '👔', desc: 'Professionell, konservativ, business-tauglich.', color: 'linear-gradient(135deg, #003366, #0066cc)' },
            { file: 'showcase-index-playful-colorful.html', name: 'Playful Colorful', version: 'v26', emoji: '🌈', desc: 'Bunt, fröhlich, verspielt. Rainbow-Palette.', color: 'linear-gradient(135deg, #8b5cf6, #ec4899, #f97316)' }
        ];
        
        const gallery = document.getElementById('gallery');
        const countEl = document.getElementById('count');
        
        designs.forEach((design, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-preview" style="background: ${design.color}">
                    <span>${design.emoji}</span>
                </div>
                <div class="card-content">
                    <span class="version-badge">${design.version}</span>
                    <h3 class="card-title">${design.name}</h3>
                    <p class="card-desc">${design.desc}</p>
                    <a href="${design.file}" class="card-btn" target="_blank">Ansehen →</a>
                </div>
            `;
            gallery.appendChild(card);
        });
        
        countEl.textContent = designs.length;
    </script>
</body>
</html>
