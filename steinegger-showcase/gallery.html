<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steinegger IT - Design Galerie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.3);
        }
        
        .card-preview {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }
        
        .card-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            filter: blur(20px);
            opacity: 0.5;
        }
        
        .card-preview span {
            position: relative;
            z-index: 1;
        }
        
        .card-content {
            padding: 24px;
        }
        
        .card-title {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .card-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .card-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }
        
        .card-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }
        
        .version-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .stats {
            text-align: center;
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Steinegger IT Design Galerie</h1>
            <p class="subtitle">15 Design-Versionen im Überblick - Durchblättern und Vergleichen</p>
        </header>
        
        <div class="gallery" id="gallery">
            <!-- Cards werden per JS eingefügt -->
        </div>
        
        <div class="stats">
            <p><strong id="count">0</strong> Design-Versionen verfügbar</p>
        </div>
    </div>
    
    <script>
        const designs = [
            { file: 'showcase-index-brutalism.html', name: 'Brutalism', version: 'brutal', emoji: '🔨', desc: 'Raw, edgy, bewusst kaputt' },
            { file: 'showcase-index-3d-immersive.html', name: '3D Immersive', version: '3d', emoji: '🧊', desc: 'Three.js Partikel-Universum' },
            { file: 'showcase-index-hand-drawn.html', name: 'Hand Drawn', version: 'hand', emoji: '✏️', desc: 'Persönlich, skizzenhaft, herzlich' },
            { file: 'showcase-index-retro-80s.html', name: 'Retro 80s/90s', version: 'retro', emoji: '🌆', desc: 'Memphis, Neon, Grid, Synthwave' },
            { file: 'showcase-index-typography.html', name: 'Typography', version: 'type', emoji: '🔤', desc: 'Pure Typografie, riesig, bold' },
            { file: 'showcase-index-organic-fluid.html', name: 'Organic Fluid', version: 'organic', emoji: '🌿', desc: 'Blobs, wellig, natürlich' },
            { file: 'showcase-index-asymmetric.html', name: 'Asymmetric', version: 'asymmetric', emoji: '⚡', desc: 'Bewusst unausgewogen, dynamisch' },
            { file: 'showcase-index-split-screen.html', name: 'Split Screen', version: 'split', emoji: '⚖️', desc: '50/50, dunkel vs. hell' },
            { file: 'showcase-index-glassmorphism.html', name: 'Glassmorphism', version: 'glass', emoji: '🪟', desc: 'Milchglas, Blur, Transluzenz' },
            { file: 'showcase-index-neo-brutalism.html', name: 'Neo-Brutalism', version: 'neo', emoji: '🎨', desc: 'Knallig, harte Schatten, Pop-Art' },
            { file: 'showcase-index-dark-premium.html', name: 'Dark Premium', version: 'darkprem', emoji: '🌑', desc: 'Luxuriös, Gold, elegant' },
            { file: 'showcase-index-minimalist-swiss.html', name: 'Minimalist Swiss', version: 'swiss', emoji: '🇨🇭', desc: 'Reduziert, viel Weissraum' },
            { file: 'showcase-index-cyberpunk.html', name: 'Cyberpunk', version: 'cyber', emoji: '🤖', desc: 'Neon, Dark, futuristisch' },
            { file: 'showcase-index-bold-dark.html', name: 'Bold Dark', version: 'dark', emoji: '🌙', desc: 'Dunkel, mutig, beeindruckend' },
            { file: 'showcase-index-clean-corporate.html', name: 'Clean Corporate', version: 'corporate', emoji: '👔', desc: 'Professionell und seriös' },
            { file: 'showcase-index-cyberpunk-neon.html', name: 'Cyberpunk', version: 'cyber', emoji: '⚡', desc: 'Neon-lit Future Vibes' },
            { file: 'showcase-index-glassmorphism.html', name: 'Glassmorphism', version: 'glass', emoji: '🔮', desc: 'Transparente Eleganz' },
            { file: 'showcase-index-gradient-mesh.html', name: 'Gradient Mesh', version: 'gradient', emoji: '🌈', desc: 'Farbverläufe in Perfektion' },
            { file: 'showcase-index-magazine.html', name: 'Magazine', version: 'magazine', emoji: '📰', desc: 'Editorial-Style Layout' },
            { file: 'showcase-index-minimalist-swiss.html', name: 'Swiss Minimal', version: 'swiss', emoji: '🇨🇭', desc: 'Schweizer Präzision pur' },
            { file: 'showcase-index-monochrome.html', name: 'Monochrome', version: 'mono', emoji: '⚫', desc: 'Einfarbig elegant' },
            { file: 'showcase-index-neomorphism.html', name: 'Neomorphism', version: 'neo', emoji: '🎯', desc: 'Soft UI mit Tiefe' },
            { file: 'showcase-index-paper-ink.html', name: 'Paper & Ink', version: 'paper', emoji: '📝', desc: 'Haptisches Print-Feeling' },
            { file: 'showcase-index-playful-colorful.html', name: 'Playful Color', version: 'playful', emoji: '🎨', desc: 'Bunt und lebendig' },
            { file: 'showcase-index-playful-v2.html', name: 'Playful V2', version: 'playful2', emoji: '🎭', desc: 'Noch mehr Spieligkeit' },
            { file: 'showcase-index-swiss-design.html', name: 'Swiss Design', version: 'swiss2', emoji: '⌚', desc: 'Zeitloses Schweizer Design' },
            { file: 'showcase-index-tech-startup.html', name: 'Tech Startup', version: 'startup', emoji: '🦄', desc: 'Silicon Valley Style' },
            { file: 'showcase-index-terminal-green.html', name: 'Terminal Green', version: 'terminal', emoji: '💚', desc: 'Klassischer Matrix-Look' }
        ];
        
        const gallery = document.getElementById('gallery');
        const countEl = document.getElementById('count');
        
        designs.forEach(design => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-preview">
                    <span>${design.emoji}</span>
                </div>
                <div class="card-content">
                    <span class="version-badge">${design.version}</span>
                    <h3 class="card-title">${design.name}</h3>
                    <p class="card-desc">${design.desc}</p>
                    <a href="${design.file}" class="card-btn" target="_blank">Ansehen →</a>
                </div>
            `;
            gallery.appendChild(card);
        });
        
        countEl.textContent = designs.length;
    </script>
</body>
</html>
