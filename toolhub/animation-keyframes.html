<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Animation Keyframes – ToolHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        .back-btn { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); color: white; text-decoration: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .logo { font-size: 3rem; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 1.1rem; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: rgba(255,255,255,0.8); }
        select, input[type="text"], input[type="number"] { width: 100%; padding: 1rem; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; font-size: 1rem; }
        select:focus, input:focus { outline: none; border-color: #667eea; }
        select option { background: #1a1a2e; color: white; }
        .color-picker-group { display: flex; gap: 10px; align-items: center; }
        input[type="color"] { width: 50px; height: 50px; border: none; border-radius: 10px; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch { border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .color-value { flex: 1; padding: 0.75rem; background: rgba(255,255,255,0.1); border-radius: 8px; font-family: monospace; }
        .slider-group { margin-bottom: 1.5rem; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); cursor: pointer; }
        .preview-area { display: flex; flex-direction: column; align-items: center; }
        .preview-container { width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; }
        .preview-box { width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .action-btn { padding: 1rem 2rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .action-btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .action-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .action-btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); }
        .action-btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .code-output { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-top: 15px; font-family: monospace; font-size: 0.85rem; word-break: break-all; max-height: 200px; overflow-y: auto; }
        .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .preset-btn { padding: 1rem; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; cursor: pointer; font-weight: 600; }
        .preset-btn:hover { background: rgba(255,255,255,0.2); }
        .play-btn { width: 100%; padding: 1rem; background: rgba(0,255,136,0.2); border: 2px solid rgba(0,255,136,0.3); border-radius: 12px; color: #00ff88; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .play-btn:hover { background: rgba(0,255,136,0.3); }
        @media (max-width: 900px) { .app-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="back-btn">← Zurück zum Dashboard</a>
            <div class="logo">🎬</div>
            <h1>Animation Keyframes</h1>
            <p class="subtitle">Erstelle CSS Keyframe Animationen ohne Code</p>
        </header>

        <div class="app-grid">
            <div class="panel">
                <h2 class="panel-title">⚙️ Animation Settings</h2>
                
                <div class="form-group">
                    <label>🎭 Animation Typ</label>
                    <select id="animType" onchange="updateAnimation()">
                        <option value="bounce">Bounce</option>
                        <option value="pulse">Pulse</option>
                        <option value="shake">Shake</option>
                        <option value="spin">Spin</option>
                        <option value="fade">Fade In/Out</option>
                        <option value="slide">Slide</option>
                        <option value="flip">Flip</option>
                        <option value="wobble">Wobble</option>
                    </select>
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>⏱️ Dauer</label><span id="durationValue">1s</span></div>
                    <input type="range" id="duration" min="0.2" max="3" value="1" step="0.1" oninput="updateAnimation()">
                </div>

                <div class="form-group">
                    <label>🔁 Wiederholung</label>
                    <select id="iteration" onchange="updateAnimation()">
                        <option value="infinite">Unendlich</option>
                        <option value="1">1x</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="5">5x</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📈 Timing Function</label>
                    <select id="timing" onchange="updateAnimation()">
                        <option value="ease">Ease</option>
                        <option value="linear">Linear</option>
                        <option value="ease-in">Ease In</option>
                        <option value="ease-out">Ease Out</option>
                        <option value="ease-in-out">Ease In-Out</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🎨 Farbe</label>
                    <div class="color-picker-group">
                        <input type="color" id="boxColor" value="#667eea" onchange="updateAnimation()">
                        <div class="color-value" id="boxColorValue">#667eea</div>
                    </div>
                </div>

                <button class="play-btn" onclick="playAnimation()">▶️ Abspielen</button>
            </div>

            <div class="panel preview-area">
                <h2 class="panel-title">👁️ Vorschau</h2>
                <div class="preview-container">
                    <div class="preview-box" id="previewBox"></div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn action-btn-primary" onclick="copyCSS()">📋 CSS kopieren</button>
                    <button class="action-btn action-btn-secondary" onclick="stopAnimation()">⏹️ Stop</button>
                </div>
                <div class="code-output" id="codeOutput">@keyframes bounce { ... }</div>
            </div>
        </div>
    </div>

    <script>
        const animations = {
            bounce: `@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}`,
            pulse: `@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}`,
            shake: `@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}`,
            spin: `@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}`,
            fade: `@keyframes fade {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}`,
            slide: `@keyframes slide {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(50px); }
}`,
            flip: `@keyframes flip {
  0%, 100% { transform: rotateY(0deg); }
  50% { transform: rotateY(180deg); }
}`,
            wobble: `@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
}`
        };

        function updateAnimation() {
            const type = document.getElementById('animType').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const iteration = document.getElementById('iteration').value;
            const timing = document.getElementById('timing').value;
            const color = document.getElementById('boxColor').value;
            const box = document.getElementById('previewBox');

            document.getElementById('durationValue').textContent = duration + 's';
            document.getElementById('boxColorValue').textContent = color;

            box.style.background = color;
            box.style.animation = `${type} ${duration}s ${timing} ${iteration}`;

            const fullCSS = `${animations[type]}

.animated-box {
  animation: ${type} ${duration}s ${timing} ${iteration};
}`;
            document.getElementById('codeOutput').textContent = fullCSS;
        }

        function playAnimation() {
            const box = document.getElementById('previewBox');
            box.style.animation = 'none';
            void box.offsetWidth;
            updateAnimation();
        }

        function stopAnimation() {
            document.getElementById('previewBox').style.animation = 'none';
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('codeOutput').textContent)
                .then(() => alert('✅ CSS kopiert!'));
        }

        window.onload = updateAnimation;
    </script>
</body>
</html>
