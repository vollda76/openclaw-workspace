<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Input Styler – ToolHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        .back-btn { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); color: white; text-decoration: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .logo { font-size: 3rem; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #4facfe, #00f2fe, #43e97b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 1.1rem; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: rgba(255,255,255,0.8); }
        input[type="text"] { width: 100%; padding: 1rem; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: #4facfe; }
        .color-picker-group { display: flex; gap: 10px; align-items: center; }
        input[type="color"] { width: 50px; height: 50px; border: none; border-radius: 10px; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch { border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .color-value { flex: 1; padding: 0.75rem; background: rgba(255,255,255,0.1); border-radius: 8px; font-family: monospace; }
        .slider-group { margin-bottom: 1.5rem; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, #4facfe, #00f2fe); cursor: pointer; }
        .preview-area { display: flex; flex-direction: column; align-items: center; }
        .preview-container { width: 100%; min-height: 250px; display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 40px; }
        .styled-input { width: 100%; max-width: 300px; padding: 15px 20px; font-size: 1rem; transition: all 0.3s ease; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .action-btn { padding: 1rem 2rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .action-btn-primary { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        .action-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,172,254,0.4); }
        .action-btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); }
        .action-btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .code-output { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-top: 15px; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
        .variant-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
        .variant-btn { padding: 1rem; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; text-align: center; cursor: pointer; font-weight: 600; }
        .variant-btn:hover { background: rgba(255,255,255,0.2); }
        .variant-btn.active { border-color: #4facfe; background: rgba(79,172,254,0.2); }
        @media (max-width: 900px) { .app-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="back-btn">← Zurück zum Dashboard</a>
            <div class="logo">📝</div>
            <h1>Input Styler</h1>
            <p class="subtitle">Designe schöne Input Fields</p>
        </header>

        <div class="app-grid">
            <div class="panel">
                <h2 class="panel-title">⚙️ Input Settings</h2>
                
                <div class="form-group">
                    <label>🏷️ Placeholder</label>
                    <input type="text" id="placeholder" value="Enter your email..." oninput="updateInput()">
                </div>

                <div class="form-group">
                    <label>📝 Label (optional)</label>
                    <input type="text" id="inputLabel" value="Email Address" oninput="updateInput()">
                </div>

                <label style="display:block;font-weight:600;margin-bottom:0.5rem;">🎨 Variant</label>
                <div class="variant-grid">
                    <button class="variant-btn active" onclick="setVariant('minimal', this)">Minimal</button>
                    <button class="variant-btn" onclick="setVariant('filled', this)">Filled</button>
                    <button class="variant-btn" onclick="setVariant('underlined', this)">Underlined</button>
                    <button class="variant-btn" onclick="setVariant('bordered', this)">Bordered</button>
                    <button class="variant-btn" onclick="setVariant('floating', this)">Floating</button>
                    <button class="variant-btn" onclick="setVariant('rounded', this)">Rounded</button>
                </div>

                <div class="form-group">
                    <label>🎨 Background</label>
                    <div class="color-picker-group">
                        <input type="color" id="inputBg" value="#1a1a2e" onchange="updateInput()">
                        <div class="color-value" id="bgValue">#1a1a2e</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎨 Border / Accent</label>
                    <div class="color-picker-group">
                        <input type="color" id="accentColor" value="#4facfe" onchange="updateInput()">
                        <div class="color-value" id="accentValue">#4facfe</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>📝 Text Farbe</label>
                    <div class="color-picker-group">
                        <input type="color" id="textColor" value="#ffffff" onchange="updateInput()">
                        <div class="color-value" id="textValue">#ffffff</div>
                    </div>
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🔴 Border Radius</label><span id="radiusValue">12px</span></div>
                    <input type="range" id="borderRadius" min="0" max="50" value="12" oninput="updateInput()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>📏 Padding</label><span id="paddingValue">15px</span></div>
                    <input type="range" id="inputPadding" min="10" max="30" value="15" oninput="updateInput()">
                </div>
            </div>

            <div class="panel preview-area">
                <h2 class="panel-title">👁️ Vorschau</h2>
                <div class="preview-container">
                    <div style="width:100%;max-width:300px;">
                        <label id="labelPreview" style="display:block;margin-bottom:8px;font-weight:600;">Email Address</label>
                        <input type="text" class="styled-input" id="previewInput" placeholder="Enter your email...">
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn action-btn-primary" onclick="copyCSS()">📋 CSS kopieren</button>
                    <button class="action-btn action-btn-secondary" onclick="copyHTML()">🌐 HTML kopieren</button>
                    <button class="action-btn action-btn-secondary" onclick="resetInput()">🔄 Reset</button>
                </div>
                <div class="code-output" id="codeOutput">.input { ... }</div>
            </div>
        </div>
    </div>

    <script>
        let variant = 'minimal';

        function setVariant(v, btn) {
            variant = v;
            document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateInput();
        }

        function updateInput() {
            const placeholder = document.getElementById('placeholder').value;
            const label = document.getElementById('inputLabel').value;
            const bg = document.getElementById('inputBg').value;
            const accent = document.getElementById('accentColor').value;
            const textCol = document.getElementById('textColor').value;
            const radius = parseInt(document.getElementById('borderRadius').value);
            const padding = parseInt(document.getElementById('inputPadding').value);

            document.getElementById('bgValue').textContent = bg;
            document.getElementById('accentValue').textContent = accent;
            document.getElementById('textValue').textContent = textCol;
            document.getElementById('radiusValue').textContent = radius + 'px';
            document.getElementById('paddingValue').textContent = padding + 'px';

            document.getElementById('labelPreview').textContent = label;
            document.getElementById('labelPreview').style.color = textCol;
            document.getElementById('labelPreview').style.display = variant === 'floating' ? 'none' : 'block';

            const input = document.getElementById('previewInput');
            input.placeholder = placeholder;
            input.style.background = variant === 'underlined' ? 'transparent' : bg;
            input.style.color = textCol;
            input.style.borderRadius = variant === 'underlined' ? '0' : radius + 'px';
            input.style.padding = padding + 'px ' + (padding * 1.5) + 'px';
            input.style.border = variant === 'underlined' ? `none` : variant === 'bordered' ? `2px solid ${bg}` : 'none';
            input.style.borderBottom = variant === 'underlined' ? `2px solid ${accent}` : 'none';
            input.style.outline = 'none';

            // Focus effect
            input.onfocus = () => {
                if (variant === 'minimal' || variant === 'filled' || variant === 'rounded') {
                    input.style.boxShadow = `0 0 0 3px ${accent}33`;
                    input.style.borderColor = accent;
                } else if (variant === 'underlined') {
                    input.style.borderBottomWidth = '3px';
                } else if (variant === 'bordered') {
                    input.style.borderColor = accent;
                } else if (variant === 'floating') {
                    input.style.boxShadow = `0 0 0 3px ${accent}33`;
                }
            };
            input.onblur = () => {
                input.style.boxShadow = '';
                input.style.borderColor = variant === 'bordered' ? bg : '';
                if (variant === 'underlined') input.style.borderBottomWidth = '2px';
            };

            const css = `.input {
  background: ${variant === 'underlined' ? 'transparent' : bg};
  color: ${textCol};
  border: ${variant === 'underlined' ? 'none' : variant === 'bordered' ? `2px solid ${bg}` : 'none'};
  ${variant === 'underlined' ? `border-bottom: 2px solid ${accent};` : ''}
  border-radius: ${variant === 'underlined' ? '0' : radius + 'px'};
  padding: ${padding}px ${padding * 1.5}px;
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}

.input:focus {
  ${variant === 'minimal' || variant === 'filled' || variant === 'rounded' ? `box-shadow: 0 0 0 3px ${accent}33;` : ''}
  ${variant === 'underlined' ? `border-bottom: 3px solid ${accent};` : ''}
  ${variant === 'bordered' ? `border-color: ${accent};` : ''}
  ${variant === 'floating' ? `box-shadow: 0 0 0 3px ${accent}33;` : ''}
}`;
            document.getElementById('codeOutput').textContent = css;
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('codeOutput').textContent)
                .then(() => alert('✅ CSS kopiert!'));
        }

        function copyHTML() {
            const html = `<div>
  <label style="display:block;margin-bottom:8px;">${document.getElementById('inputLabel').value}</label>
  <input type="text" class="input" placeholder="${document.getElementById('placeholder').value}">
</div>`;
            navigator.clipboard.writeText(html).then(() => alert('✅ HTML kopiert!'));
        }

        function resetInput() {
            document.getElementById('placeholder').value = 'Enter your email...';
            document.getElementById('inputLabel').value = 'Email Address';
            document.getElementById('inputBg').value = '#1a1a2e';
            document.getElementById('accentColor').value = '#4facfe';
            document.getElementById('textColor').value = '#ffffff';
            document.getElementById('borderRadius').value = 12;
            document.getElementById('inputPadding').value = 15;
            variant = 'minimal';
            document.querySelectorAll('.variant-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
            updateInput();
        }

        window.onload = updateInput;
    </script>
</body>
</html>
