<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Shadow Studio – ToolHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        .back-btn { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); color: white; text-decoration: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .logo { font-size: 3rem; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 1.1rem; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: rgba(255,255,255,0.8); }
        input[type="text"], input[type="number"] { width: 100%; padding: 1rem; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: #667eea; }
        .color-picker-group { display: flex; gap: 10px; align-items: center; }
        input[type="color"] { width: 50px; height: 50px; border: none; border-radius: 10px; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch { border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .color-value { flex: 1; padding: 0.75rem; background: rgba(255,255,255,0.1); border-radius: 8px; font-family: monospace; }
        .slider-group { margin-bottom: 1.5rem; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); cursor: pointer; }
        .preview-area { display: flex; flex-direction: column; align-items: center; }
        .preview-box {
            width: 200px; height: 200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .action-btn { padding: 1rem 2rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .action-btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .action-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .action-btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); }
        .action-btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .code-output { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-top: 15px; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
        .layer-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .layer-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; }
        .layer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .layer-actions { display: flex; gap: 10px; }
        .layer-btn { padding: 5px 10px; background: rgba(255,255,255,0.2); border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 0.75rem; }
        .layer-btn:hover { background: rgba(255,255,255,0.3); }
        .layer-btn.delete { background: rgba(239,68,68,0.3); }
        .add-layer-btn { width: 100%; padding: 1rem; background: rgba(0,255,136,0.2); border: 2px solid rgba(0,255,136,0.3); border-radius: 12px; color: #00ff88; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .add-layer-btn:hover { background: rgba(0,255,136,0.3); }
        @media (max-width: 900px) { .app-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="back-btn">← Zurück zum Dashboard</a>
            <div class="logo">✨</div>
            <h1>Shadow Studio</h1>
            <p class="subtitle">Erstelle perfekte Box-Shadow und Text-Shadow Effekte</p>
        </header>

        <div class="app-grid">
            <div class="panel">
                <h2 class="panel-title">⚙️ Shadow Einstellungen</h2>
                
                <div class="form-group">
                    <label>📐 Shadow Typ</label>
                    <select id="shadowType" onchange="updatePreview()" style="width:100%;padding:1rem;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:12px;color:white;font-size:1rem;">
                        <option value="box">Box Shadow</option>
                        <option value="text">Text Shadow</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🎨 Shadow Farbe</label>
                    <div class="color-picker-group">
                        <input type="color" id="shadowColor" value="#000000" onchange="updatePreview()">
                        <div class="color-value" id="shadowColorValue">#000000</div>
                    </div>
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>📏 X Offset</label><span id="xValue">10px</span></div>
                    <input type="range" id="xOffset" min="-100" max="100" value="10" oninput="updatePreview()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>📏 Y Offset</label><span id="yValue">10px</span></div>
                    <input type="range" id="yOffset" min="-100" max="100" value="10" oninput="updatePreview()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🌫️ Blur Radius</label><span id="blurValue">20px</span></div>
                    <input type="range" id="blurRadius" min="0" max="100" value="20" oninput="updatePreview()">
                </div>

                <div class="slider-group" id="spreadGroup">
                    <div class="slider-header"><label>📐 Spread Radius</label><span id="spreadValue">0px</span></div>
                    <input type="range" id="spreadRadius" min="-50" max="50" value="0" oninput="updatePreview()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🔍 Opacity</label><span id="opacityValue">30%</span></div>
                    <input type="range" id="opacity" min="0" max="100" value="30" oninput="updatePreview()">
                </div>

                <div class="form-group">
                    <label>⬜ Hintergrund Farbe</label>
                    <div class="color-picker-group">
                        <input type="color" id="bgColor" value="#1a1a2e" onchange="updatePreview()">
                        <div class="color-value" id="bgColorValue">#1a1a2e</div>
                    </div>
                </div>

                <button class="add-layer-btn" onclick="addLayer()">➕ Shadow Layer hinzufügen</button>
            </div>

            <div class="panel preview-area">
                <h2 class="panel-title">👁️ Vorschau</h2>
                <div class="preview-box" id="previewBox">Aa</div>
                <div class="action-buttons">
                    <button class="action-btn action-btn-primary" onclick="copyCSS()">📋 CSS kopieren</button>
                    <button class="action-btn action-btn-secondary" onclick="resetShadow()">🔄 Reset</button>
                </div>
                <div class="code-output" id="codeOutput">box-shadow: 10px 10px 20px 0px rgba(0,0,0,0.3);</div>
                <div class="layer-list" id="layerList"></div>
            </div>
        </div>
    </div>

    <script>
        let layers = [];

        function rgbaFromHex(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${opacity/100})`;
        }

        function updatePreview() {
            const type = document.getElementById('shadowType').value;
            const color = document.getElementById('shadowColor').value;
            const x = parseInt(document.getElementById('xOffset').value);
            const y = parseInt(document.getElementById('yOffset').value);
            const blur = parseInt(document.getElementById('blurRadius').value);
            const spread = parseInt(document.getElementById('spreadRadius').value);
            const opacity = parseInt(document.getElementById('opacity').value);
            const bgColor = document.getElementById('bgColor').value;

            document.getElementById('xValue').textContent = x + 'px';
            document.getElementById('yValue').textContent = y + 'px';
            document.getElementById('blurValue').textContent = blur + 'px';
            document.getElementById('spreadValue').textContent = spread + 'px';
            document.getElementById('opacityValue').textContent = opacity + '%';
            document.getElementById('shadowColorValue').textContent = color;
            document.getElementById('bgColorValue').textContent = bgColor;

            const shadow = `${x}px ${y}px ${blur}px ${spread}px ${rgbaFromHex(color, opacity)}`;
            const box = document.getElementById('previewBox');
            
            box.style.background = bgColor;
            
            if (type === 'box') {
                box.style.boxShadow = shadow;
                box.style.textShadow = 'none';
                box.style.color = 'white';
                document.getElementById('spreadGroup').style.display = 'block';
            } else {
                box.style.boxShadow = 'none';
                box.style.textShadow = shadow;
                box.style.color = 'white';
                document.getElementById('spreadGroup').style.display = 'none';
            }

            const cssProp = type === 'box' ? 'box-shadow' : 'text-shadow';
            const cssValue = type === 'box' ? shadow : `${x}px ${y}px ${blur}px ${rgbaFromHex(color, opacity)}`;
            document.getElementById('codeOutput').textContent = `${cssProp}: ${cssValue};`;
        }

        function addLayer() {
            const color = document.getElementById('shadowColor').value;
            const x = parseInt(document.getElementById('xOffset').value);
            const y = parseInt(document.getElementById('yOffset').value);
            const blur = parseInt(document.getElementById('blurRadius').value);
            const spread = parseInt(document.getElementById('spreadRadius').value);
            const opacity = parseInt(document.getElementById('opacity').value);

            layers.push({ color, x, y, blur, spread, opacity });
            renderLayers();
            updateMultiShadow();
        }

        function renderLayers() {
            const list = document.getElementById('layerList');
            list.innerHTML = layers.map((layer, i) => `
                <div class="layer-item">
                    <div class="layer-header">
                        <span>Layer ${i + 1}</span>
                        <div class="layer-actions">
                            <button class="layer-btn" onclick="loadLayer(${i})">Laden</button>
                            <button class="layer-btn delete" onclick="removeLayer(${i})">Löschen</button>
                        </div>
                    </div>
                    <div style="font-size:0.8rem;color:rgba(255,255,255,0.6);">
                        ${layer.x}px ${layer.y}px ${layer.blur}px ${layer.spread}px ${rgbaFromHex(layer.color, layer.opacity)}
                    </div>
                </div>
            `).join('');
        }

        function loadLayer(i) {
            const layer = layers[i];
            document.getElementById('shadowColor').value = layer.color;
            document.getElementById('xOffset').value = layer.x;
            document.getElementById('yOffset').value = layer.y;
            document.getElementById('blurRadius').value = layer.blur;
            document.getElementById('spreadRadius').value = layer.spread;
            document.getElementById('opacity').value = layer.opacity;
            updatePreview();
        }

        function removeLayer(i) {
            layers.splice(i, 1);
            renderLayers();
            updateMultiShadow();
        }

        function updateMultiShadow() {
            if (layers.length === 0) return;
            const shadow = layers.map(l => 
                `${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${rgbaFromHex(l.color, l.opacity)}`
            ).join(', ');
            document.getElementById('previewBox').style.boxShadow = shadow;
            document.getElementById('codeOutput').textContent = `box-shadow: ${shadow};`;
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('codeOutput').textContent)
                .then(() => alert('✅ CSS kopiert!'));
        }

        function resetShadow() {
            layers = [];
            renderLayers();
            document.getElementById('shadowColor').value = '#000000';
            document.getElementById('xOffset').value = 10;
            document.getElementById('yOffset').value = 10;
            document.getElementById('blurRadius').value = 20;
            document.getElementById('spreadRadius').value = 0;
            document.getElementById('opacity').value = 30;
            updatePreview();
        }

        window.onload = updatePreview;
    </script>
</body>
</html>
