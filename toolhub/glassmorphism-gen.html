<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪟 Glassmorphism Generator – ToolHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        .back-btn { display: inline-block; padding: 0.5rem 1rem; background: rgba(255,255,255,0.1); color: white; text-decoration: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .logo { font-size: 3rem; margin-bottom: 0.5rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #a8edea, #fed6e3, #a8edea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 1.1rem; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .panel { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: rgba(255,255,255,0.8); }
        .color-picker-group { display: flex; gap: 10px; align-items: center; }
        input[type="color"] { width: 50px; height: 50px; border: none; border-radius: 10px; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch { border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .color-value { flex: 1; padding: 0.75rem; background: rgba(255,255,255,0.1); border-radius: 8px; font-family: monospace; }
        .slider-group { margin-bottom: 1.5rem; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, #a8edea, #fed6e3); cursor: pointer; }
        .preview-area { display: flex; flex-direction: column; align-items: center; }
        .preview-container { width: 100%; min-height: 300px; border-radius: 20px; padding: 40px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .glass-card { padding: 40px; border-radius: 20px; text-align: center; transition: all 0.3s ease; }
        .action-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .action-btn { padding: 1rem 2rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .action-btn-primary { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #1a1a2e; }
        .action-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168,237,234,0.4); }
        .action-btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); }
        .action-btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .code-output { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; margin-top: 15px; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
        .bg-pattern { position: absolute; width: 150px; height: 150px; border-radius: 50%; filter: blur(40px); opacity: 0.8; }
        .bg-1 { top: 20px; left: 20px; background: #667eea; }
        .bg-2 { bottom: 20px; right: 20px; background: #f093fb; }
        @media (max-width: 900px) { .app-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="back-btn">← Zurück zum Dashboard</a>
            <div class="logo">🪟</div>
            <h1>Glassmorphism Gen</h1>
            <p class="subtitle">Erstelle Glassmorphismus Effekte für moderne UIs</p>
        </header>

        <div class="app-grid">
            <div class="panel">
                <h2 class="panel-title">⚙️ Glass Settings</h2>
                
                <div class="form-group">
                    <label>🎨 Hintergrund Farbe</label>
                    <div class="color-picker-group">
                        <input type="color" id="bgColor" value="#ffffff" onchange="updateGlass()">
                        <div class="color-value" id="bgColorValue">#ffffff</div>
                    </div>
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🌫️ Blur Strength</label><span id="blurValue">10px</span></div>
                    <input type="range" id="blurRadius" min="0" max="30" value="10" oninput="updateGlass()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🔍 Opacity</label><span id="opacityValue">20%</span></div>
                    <input type="range" id="glassOpacity" min="5" max="80" value="20" oninput="updateGlass()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🔲 Border Radius</label><span id="radiusValue">20px</span></div>
                    <input type="range" id="borderRadius" min="0" max="50" value="20" oninput="updateGlass()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>✨ Border Opacity</label><span id="borderOpacityValue">30%</span></div>
                    <input type="range" id="borderOpacity" min="0" max="100" value="30" oninput="updateGlass()">
                </div>

                <div class="slider-group">
                    <div class="slider-header"><label>🌟 Shadow Intensity</label><span id="shadowValue">50%</span></div>
                    <input type="range" id="shadowIntensity" min="0" max="100" value="50" oninput="updateGlass()">
                </div>
            </div>

            <div class="panel preview-area">
                <h2 class="panel-title">👁️ Vorschau</h2>
                <div class="preview-container" id="previewContainer">
                    <div class="bg-pattern bg-1"></div>
                    <div class="bg-pattern bg-2"></div>
                    <div class="glass-card" id="glassCard">
                        <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Glass Card</h3>
                        <p style="opacity: 0.8;">Beautiful glassmorphism effect</p>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="action-btn action-btn-primary" onclick="copyCSS()">📋 CSS kopieren</button>
                    <button class="action-btn action-btn-secondary" onclick="toggleBackground()">🖼️ BG wechseln</button>
                </div>
                <div class="code-output" id="codeOutput">.glass { backdrop-filter: blur(10px); ... }</div>
            </div>
        </div>
    </div>

    <script>
        let bgIndex = 0;
        const backgrounds = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
        ];

        function updateGlass() {
            const bgColor = document.getElementById('bgColor').value;
            const blur = parseInt(document.getElementById('blurRadius').value);
            const opacity = parseInt(document.getElementById('glassOpacity').value);
            const radius = parseInt(document.getElementById('borderRadius').value);
            const borderOpacity = parseInt(document.getElementById('borderOpacity').value);
            const shadow = parseInt(document.getElementById('shadowIntensity').value);

            document.getElementById('bgColorValue').textContent = bgColor;
            document.getElementById('blurValue').textContent = blur + 'px';
            document.getElementById('opacityValue').textContent = opacity + '%';
            document.getElementById('radiusValue').textContent = radius + 'px';
            document.getElementById('borderOpacityValue').textContent = borderOpacity + '%';
            document.getElementById('shadowValue').textContent = shadow + '%';

            const rgba = hexToRgba(bgColor, opacity / 100);
            const borderRgba = hexToRgba('#ffffff', borderOpacity / 100);
            const shadowIntensity = shadow / 100;

            const card = document.getElementById('glassCard');
            card.style.background = rgba;
            card.style.backdropFilter = `blur(${blur}px)`;
            card.style.webkitBackdropFilter = `blur(${blur}px)`;
            card.style.borderRadius = radius + 'px';
            card.style.border = `1px solid ${borderRgba}`;
            card.style.boxShadow = `0 ${8 * shadowIntensity}px ${32 * shadowIntensity}px rgba(0,0,0,${0.1 * shadowIntensity})`;

            const css = `.glass {
  background: ${rgba};
  backdrop-filter: blur(${blur}px);
  -webkit-backdrop-filter: blur(${blur}px);
  border-radius: ${radius}px;
  border: 1px solid ${borderRgba};
  box-shadow: 0 ${8 * shadowIntensity}px ${32 * shadowIntensity}px rgba(0,0,0,${0.1 * shadowIntensity});
}`;
            document.getElementById('codeOutput').textContent = css;
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('codeOutput').textContent)
                .then(() => alert('✅ CSS kopiert!'));
        }

        function toggleBackground() {
            bgIndex = (bgIndex + 1) % backgrounds.length;
            document.getElementById('previewContainer').style.background = backgrounds[bgIndex];
        }

        window.onload = function() {
            document.getElementById('previewContainer').style.background = backgrounds[0];
            updateGlass();
        };
    </script>
</body>
</html>
